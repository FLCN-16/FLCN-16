name: Fetch Currency Rates

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:       # Manual trigger from GitHub UI

jobs:
  fetch-rates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch currency rates from FreeCurrencyAPI
        run: |
          mkdir -p data
          RESPONSE=$(curl -s "https://api.freecurrencyapi.com/v1/latest?apikey=${{ secrets.FREE_CURRENCY_API_KEY }}")
          echo $RESPONSE | jq --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" '. + {fetchedAt: $ts}' > data/latest.json
          echo "Fetched rates at $(date -u)"
          cat data/latest.json

      - name: Save timestamped snapshot
        run: |
          mkdir -p data/history
          TIMESTAMP=$(date -u +%Y-%m-%dT%H-%M-%SZ)
          cp data/latest.json data/history/$TIMESTAMP.json

      - name: Commit and push updated rates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: currency rates update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push